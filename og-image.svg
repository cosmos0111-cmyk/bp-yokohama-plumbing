<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d2137"/>
      <stop offset="100%" stop-color="#0a1628"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00bcd4"/>
      <stop offset="100%" stop-color="#0a1628"/>
    </linearGradient>
  </defs>

  <!-- 배경 -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Geometric pattern -->
  <circle cx="-5" cy="593" r="84" fill="#0a1628" opacity="0.13"/>
    <circle cx="518" cy="-4" r="49" fill="#0a1628" opacity="0.14"/>
    <circle cx="1037" cy="-37" r="33" fill="#0a1628" opacity="0.18"/>
    <circle cx="1273" cy="223" r="46" fill="#0a1628" opacity="0.13"/>
    <circle cx="1276" cy="-52" r="64" fill="#0a1628" opacity="0.07"/>
    <circle cx="177" cy="271" r="77" fill="#0a1628" opacity="0.19"/>
    <rect x="1065" y="576" width="28" height="63" rx="8" fill="#0d2137" opacity="0.06" transform="rotate(27, 1008, 66)"/>
    <rect x="107" y="584" width="96" height="41" rx="8" fill="#0d2137" opacity="0.14" transform="rotate(29, 749, -84)"/>
    <rect x="483" y="712" width="85" height="85" rx="8" fill="#0d2137" opacity="0.10" transform="rotate(41, 1153, -9)"/>
    <rect x="68" y="247" width="96" height="35" rx="8" fill="#0d2137" opacity="0.15" transform="rotate(32, 812, 313)"/>
    <rect x="463" y="0" width="27" height="32" rx="8" fill="#0d2137" opacity="0.06" transform="rotate(37, 102, 121)"/>
    <rect x="997" y="327" width="43" height="20" rx="8" fill="#0d2137" opacity="0.10" transform="rotate(43, 1019, 490)"/>
    <rect x="1239" y="28" width="32" height="72" rx="8" fill="#0d2137" opacity="0.09" transform="rotate(21, 5, 557)"/>
    <rect x="585" y="-73" width="86" height="80" rx="8" fill="#0d2137" opacity="0.14" transform="rotate(10, 487, 96)"/>
    <polygon points="382,-51 447,79 317,79" fill="#0a1628" opacity="0.08"/>
    <polygon points="26,340 54,396 -2,396" fill="#0a1628" opacity="0.05"/>
    <polygon points="40,268 106,400 -26,400" fill="#0a1628" opacity="0.08"/>
    <polygon points="280,270 366,442 194,442" fill="#0a1628" opacity="0.05"/>

  <!-- Wave at bottom -->
  <path d="M0,552 C360,591 840,513 1200,552 L1200,630 L0,630Z" fill="#0a1628" opacity="0.3"/>

  <!-- 중앙 텍스트 카드 -->
  <rect x="80" y="195" width="1040" height="260" rx="20" fill="rgba(0,0,0,0.35)" filter="url(#blur-bg)"/>
  <filter id="blur-bg"><feGaussianBlur stdDeviation="8"/></filter>

  <text x="600" y="270" text-anchor="middle" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="44" font-weight="700" fill="#ffffff" letter-spacing="2">
    홍대 노래방 추천정보
  </text>
  <text x="600" y="330" text-anchor="middle" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="22" font-weight="400" fill="rgba(255,255,255,0.85)">
    홍대 — 노래방
  </text>

  <!-- Accent line -->
  <line x1="450" y1="355" x2="750" y2="355" stroke="#00bcd4" stroke-width="3" stroke-linecap="round" opacity="0.8"/>

  <!-- 하단 CTA -->
  <rect x="440" y="385" width="320" height="40" rx="20" fill="#00bcd4" opacity="0.9"/>
  <text x="600" y="411" text-anchor="middle" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="16" font-weight="600" fill="#ffffff">
    ▼ 자세히 보기
  </text>

  <!-- 상단 브랜드 -->
  <text x="60" y="55" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="18" font-weight="600" fill="rgba(255,255,255,0.6)">
    홍대 홍대 노래방 추천정보 — 노래방
  </text>
</svg>